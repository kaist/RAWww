name: Android APK (manual)

# Manual only — same policy as the desktop build workflow.
on:
  workflow_dispatch:
    inputs:
      pyside_version:
        description: "PySide6/shiboken6 version (must have Android aarch64 wheels)"
        default: "6.11.1"

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    env:
      PYSIDE_VERSION: ${{ github.event.inputs.pyside_version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # pyside6-android-deploy rejects 3.12+

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install host build tooling
        run: |
          python -m pip install --upgrade pip
          pip install "PySide6==${PYSIDE_VERSION}" jinja2 pkginfo tqdm buildozer cython
          sudo apt-get update
          # Full dependency set for the python-for-android native build so we
          # stop hitting missing-package failures one at a time:
          #  * autotools stack (+ libltdl-dev, gettext/autopoint, texinfo) for
          #    libffi/openssl autoreconf steps;
          #  * host -dev libs used by the CPython recipe (bzip2/lzma/sqlite/
          #    readline/gdbm/uuid) plus ffi/ssl/ncurses/zlib;
          #  * git/patch/patchelf/cmake/ccache used across recipes and packaging.
          sudo apt-get install -y --no-install-recommends \
            autoconf automake libtool libtool-bin libltdl-dev pkg-config \
            gettext autopoint texinfo \
            build-essential ccache cmake git patch patchelf \
            zlib1g-dev libncurses-dev libffi-dev libssl-dev \
            libbz2-dev liblzma-dev libsqlite3-dev libreadline-dev \
            libgdbm-dev uuid-dev \
            unzip zip

      - name: Download Android Qt wheels
        run: |
          mkdir -p wheels
          base="https://download.qt.io/official_releases/QtForPython"
          curl -fSL -o "wheels/pyside6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl" \
            "${base}/pyside6/pyside6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl"
          curl -fSL -o "wheels/shiboken6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl" \
            "${base}/shiboken6/shiboken6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl"

      - name: Download Android NDK
        run: |
          # Qt 6.11 targets NDK r26b. The config phase of pyside6-android-deploy
          # needs the NDK before buildozer's own download runs, so fetch it here
          # and pass it explicitly via --ndk-path.
          curl -fSL -o ndk.zip \
            "https://dl.google.com/android/repository/android-ndk-r26b-linux.zip"
          unzip -q ndk.zip
          echo "NDK_PATH=$PWD/android-ndk-r26b" >> "$GITHUB_ENV"

      - name: Provision a clean Android SDK
        run: |
          # A self-contained SDK avoids three buildozer traps:
          #  * the runner's preinstalled SDK ships a legacy tools/bin/sdkmanager
          #    that crashes on JDK 17 (NoClassDefFoundError javax/xml/bind ...);
          #    this dir has only modern cmdline-tools.
          #  * licenses are accepted here, so buildozer never hits the
          #    interactive "Accept? (y/N)" prompt.
          #  * only build-tools 33.0.2 is installed (still ships aidl, removed in
          #    34+). buildozer picks the highest installed version, so it uses
          #    this one instead of downloading a newer aidl-less build-tools.
          SDK="${HOME}/android-sdk"
          mkdir -p "${SDK}/cmdline-tools"
          curl -fSL -o cltools.zip \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          unzip -q cltools.zip -d "${SDK}/cmdline-tools"
          mv "${SDK}/cmdline-tools/cmdline-tools" "${SDK}/cmdline-tools/latest"
          mgr="${SDK}/cmdline-tools/latest/bin/sdkmanager"
          yes | "${mgr}" --sdk_root="${SDK}" --licenses > /dev/null 2>&1 || true
          "${mgr}" --sdk_root="${SDK}" \
            "platform-tools" "platforms;android-34" "build-tools;33.0.2" > /dev/null
          # buildozer's bundled p4a hardcodes the legacy tools/bin/sdkmanager
          # path. That obsolete binary crashes on JDK 17 (JAXB removed), so point
          # the legacy path at the modern cmdline-tools sdkmanager instead.
          mkdir -p "${SDK}/tools/bin"
          ln -sf "${SDK}/cmdline-tools/latest/bin/sdkmanager" "${SDK}/tools/bin/sdkmanager"
          ln -sf "${SDK}/cmdline-tools/latest/bin/avdmanager" "${SDK}/tools/bin/avdmanager"
          echo "SDK_PATH=${SDK}" >> "$GITHUB_ENV"

      - name: Assemble mobile project
        run: |
          mkdir -p build
          cp android/main.py android/pysidedeploy.spec build/
          cp -r src/rawww build/rawww
          rm -rf build/rawww/__pycache__
          # Drop desktop-only modules so the Android module/requirement scan
          # never pulls QtMultimedia, onnxruntime or benchmark scripts.
          rm -f build/rawww/app.py \
                build/rawww/ai.py \
                build/rawww/ai_benchmark.py \
                build/rawww/benchmark.py \
                build/rawww/compare_decoders.py \
                build/rawww/cache_info.py \
                build/rawww/profile_pipeline.py \
                build/rawww/xmp.py

      - name: Build APK
        working-directory: build
        run: |
          pyside6-android-deploy -f -v \
            --wheel-pyside  "../wheels/pyside6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl" \
            --wheel-shiboken "../wheels/shiboken6-${PYSIDE_VERSION}-${PYSIDE_VERSION}-cp311-cp311-android_aarch64.whl" \
            --ndk-path "${NDK_PATH}" \
            --sdk-path "${SDK_PATH}" \
            -c pysidedeploy.spec

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rawww-android
          path: |
            build/*.apk
            build/*.aab
          if-no-files-found: warn
