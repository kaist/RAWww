name: Build desktop packages

on:
  push:
    branches:
      - devin/1784810648-macos-launch-diagnostics
  workflow_dispatch:
    inputs:
      create_release:
        description: "Создать GitHub Release после успешной сборки всех платформ"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows packages
            os: windows-latest
          - name: macOS Apple Silicon DMG
            os: macos-14
            macos_arch: arm64
          - name: macOS Intel DMG
            os: macos-15-intel
            macos_arch: intel
          - name: Linux AppImage
            os: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Install ExifTool packer for macOS
        if: runner.os == 'macOS'
        run: |
          brew install perl cpanminus
          perl_prefix="$(brew --prefix perl)"
          cpanm="$(brew --prefix cpanminus)/bin/cpanm"
          perl_lib="$RUNNER_TEMP/exiftool-perl"
          "$perl_prefix/bin/perl" "$cpanm" --notest --local-lib-contained "$perl_lib" PAR::Packer
          PERL5LIB="$perl_lib/lib/perl5" "$perl_prefix/bin/perl" "$perl_lib/bin/pp" --version
          echo "$perl_prefix/bin" >> "$GITHUB_PATH"
          echo "EXIFTOOL_PP=$perl_lib/bin/pp" >> "$GITHUB_ENV"
          echo "PERL5LIB=$perl_lib/lib/perl5" >> "$GITHUB_ENV"

      - name: Install ExifTool packer for Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes build-essential cpanminus libegl1 libperl-dev libpulse0 zlib1g-dev
          perl_lib="$RUNNER_TEMP/exiftool-perl"
          if ! cpanm --notest --local-lib-contained "$perl_lib" PAR::Packer; then
            find "$HOME/.cpanm/work" -name build.log -type f -exec sh -c 'echo "--- $1"; cat "$1"' _ {} \;
            exit 1
          fi
          PERL5LIB="$perl_lib/lib/perl5" "$perl_lib/bin/pp" --version
          echo "EXIFTOOL_PP=$perl_lib/bin/pp" >> "$GITHUB_ENV"
          echo "PERL5LIB=$perl_lib/lib/perl5" >> "$GITHUB_ENV"

      - name: Build portable Windows application
        if: runner.os == 'Windows'
        run: uv run python scripts/build_pyinstaller.py --portable

      - name: Smoke-test portable Windows application
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (!(Test-Path "dist/ctrlka/portable.flag")) {
            throw "Portable marker is missing"
          }
          uv run python scripts/smoke_test_package.py --app-dir dist/ctrlka

      - name: Create Windows portable archive
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/ctrlka -DestinationPath dist/ctrlka-windows-portable.zip

      - name: Prepare Windows installer build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Remove-Item dist/ctrlka/portable.flag -Force
          Remove-Item dist/ctrlka/work -Recurse -Force -ErrorAction SilentlyContinue

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress --yes

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer\ctrlka.iss'

      - name: Build macOS application
        if: runner.os == 'macOS'
        # PAR::Packer создаёт вложенный загрузчик и требует управляющий терминал.
        run: script -q /dev/null uv run python scripts/build_pyinstaller.py

      - name: Smoke-test macOS application
        if: runner.os == 'macOS'
        run: uv run python scripts/smoke_test_package.py --app-dir dist/ctrlka.app --screenshot dist/ctrlka-startup.png

      - name: Build macOS DMG
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Раздаём нативный .app от PyInstaller: правильный layout
          # (Contents/MacOS + Contents/Frameworks) и цельная ad-hoc подпись,
          # доведённые build_pyinstaller.py. Больше ничего вручную не собираем.
          # -fs HFS+ обязателен: без него hdiutil на macOS 14/15 создаёт APFS-образ,
          # который не монтируется на более старых версиях macOS.
          hdiutil create -volname Контролька -srcfolder "dist/ctrlka.app" -fs HFS+ -ov -format UDZO "dist/ctrlka-macos-${{ matrix.macos_arch }}.dmg"

      - name: Verify macOS DMG launches like a real user
        if: runner.os == 'macOS'
        shell: bash
        # Постоянный сторож: воспроизводит пользовательский путь по итоговому DMG
        # (карантин → монтирование → копирование .app → запуск), которого не даёт
        # дымовой тест. Именно на этом пути раньше «ничего не происходило».
        run: |
          set -x
          dmg="dist/ctrlka-macos-${{ matrix.macos_arch }}.dmg"
          # Помечаем DMG карантином, как это делает браузер при скачивании.
          xattr -w com.apple.quarantine "0181;00000000;Safari;00000000-0000-0000-0000-000000000000" "$dmg" || true
          mount_dir="$(mktemp -d)"
          hdiutil attach "$dmg" -nobrowse -readonly -mountpoint "$mount_dir"
          app_dir="$RUNNER_TEMP/ctrlka-installed.app"
          rm -rf "$app_dir"
          # Копируем .app из образа, как пользователь перетаскивает его в Applications.
          cp -R "$mount_dir/ctrlka.app" "$app_dir"
          hdiutil detach "$mount_dir"

          echo "== Оценка Gatekeeper (spctl) =="
          spctl -a -t exec -vvv "$app_dir" || true
          echo "== Проверка подписи бандла =="
          codesign --verify --deep --strict --verbose=4 "$app_dir" || true
          echo "== Подпись главного исполняемого файла =="
          codesign --display --verbose=4 "$app_dir/Contents/MacOS/ctrlka" || true

          echo "== Запуск подписанного бандла =="
          # Снимаем карантин — это эквивалент кнопки «Открыть всё равно».
          xattr -dr com.apple.quarantine "$app_dir" || true
          exec_path="$app_dir/Contents/MacOS/ctrlka"
          QT_QPA_PLATFORM=offscreen RAWWW_CAPTURE_SCREENSHOT="$RUNNER_TEMP/launch.png" "$exec_path" &
          pid=$!
          launched=0
          for _ in $(seq 1 15); do
            if [ -s "$RUNNER_TEMP/launch.png" ]; then launched=1; break; fi
            kill -0 "$pid" 2>/dev/null || break
            sleep 1
          done
          if kill -0 "$pid" 2>/dev/null; then kill "$pid" 2>/dev/null || true; wait "$pid" 2>/dev/null || true; fi
          if [ "$launched" != 1 ]; then
            echo "ЗАПУСК ПРОВАЛЕН: подписанный бандл не дошёл до отрисовки"
            echo "== Системные причины (kernel/amfid/taskgated) за 3 мин =="
            log show --last 3m --predicate 'process == "kernel" OR process == "amfid" OR process == "taskgated" OR process == "syspolicyd"' --style compact 2>/dev/null | grep -iE "ctrlka|amfi|codesign|invalid|kill" | tail -60 || true
            exit 1
          fi
          echo "ЗАПУСК OK: подписанный бандл отрисовал стартовый экран"

      - name: Build Linux application
        if: runner.os == 'Linux'
        # Как и на macOS, запускаем упаковщик ExifTool через pseudo-TTY.
        run: script --quiet --return --command 'uv run python scripts/build_pyinstaller.py' /dev/null

      - name: Smoke-test Linux application
        if: runner.os == 'Linux'
        run: uv run python scripts/smoke_test_package.py --app-dir dist/ctrlka --screenshot dist/ctrlka-startup.png

      - name: Build Linux AppImage
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/share/applications AppDir/usr/share/icons/hicolor/256x256/apps
          cp -R dist/ctrlka/. AppDir/usr/bin/
          cp src/rawww/assets/ctrlka-icon.png AppDir/usr/share/icons/hicolor/256x256/apps/ctrlka.png
          cat > AppDir/usr/share/applications/ctrlka.desktop <<'DESKTOP'
          [Desktop Entry]
          Type=Application
          Name=Контролька
          Exec=ctrlka
          Icon=ctrlka
          Categories=Graphics;Photography;
          DESKTOP
          cp AppDir/usr/share/applications/ctrlka.desktop AppDir/ctrlka.desktop
          cp src/rawww/assets/ctrlka-icon.png AppDir/ctrlka.png
          cat > AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          exec "$(dirname "$0")/usr/bin/ctrlka" "$@"
          APPRUN
          chmod +x AppDir/AppRun
          curl -L --fail -o appimagetool.AppImage https://github.com/AppImage/appimagetool/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage
          ARCH=x86_64 ./appimagetool.AppImage AppDir dist/ctrlka-linux.AppImage

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ctrlka-windows
          path: |
            dist/ctrlka-windows-portable.zip
            dist/installer/ctrlka-windows-setup.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ctrlka-macos-${{ matrix.macos_arch }}
          path: |
            dist/ctrlka-macos-${{ matrix.macos_arch }}.dmg
            dist/ctrlka-startup.png
          if-no-files-found: error

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ctrlka-linux
          path: |
            dist/ctrlka-linux.AppImage
            dist/ctrlka-startup.png
          if-no-files-found: error

  release:
    name: Создать GitHub Release
    needs: build
    if: inputs.create_release == true
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Определить версию релиза
        id: version
        shell: bash
        run: echo "tag=v$(tr -d '\r\n' < VERSION).$(git rev-list --count HEAD)" >> "$GITHUB_OUTPUT"

      - name: Скачать пакеты сборки
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Опубликовать релиз и пакеты
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "Контролька $RELEASE_TAG" \
            --generate-notes \
            release-assets/ctrlka-windows/ctrlka-windows-portable.zip \
            release-assets/ctrlka-windows/installer/ctrlka-windows-setup.exe \
            release-assets/ctrlka-macos-arm64/ctrlka-macos-arm64.dmg \
            release-assets/ctrlka-macos-intel/ctrlka-macos-intel.dmg \
            release-assets/ctrlka-linux/ctrlka-linux.AppImage
